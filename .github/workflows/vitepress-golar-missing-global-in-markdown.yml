name: vitepress-golar-missing-global-in-markdown

on:
  push:
    paths:
      - ".github/workflows/vitepress-golar-missing-global-in-markdown.yml"
      - "vitepress-golar-missing-global-in-markdown/**"
  pull_request:
    paths:
      - ".github/workflows/vitepress-golar-missing-global-in-markdown.yml"
      - "vitepress-golar-missing-global-in-markdown/**"
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitepress-golar-missing-global-in-markdown
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vitepress-golar-missing-global-in-markdown/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-workspace

      - name: Verify repro behavior
        run: pnpm run ci:repro
