name: vitepress-vue-tsc-markdown-button-handlers

on:
  push:
    paths:
      - ".github/workflows/vitepress-vue-tsc-markdown-button-handlers.yml"
      - "vitepress-vue-tsc-markdown-button-handlers/**"
  pull_request:
    paths:
      - ".github/workflows/vitepress-vue-tsc-markdown-button-handlers.yml"
      - "vitepress-vue-tsc-markdown-button-handlers/**"
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitepress-vue-tsc-markdown-button-handlers
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vitepress-vue-tsc-markdown-button-handlers/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-workspace

      - name: Verify repro behavior
        run: pnpm run ci:repro
