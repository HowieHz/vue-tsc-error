name: vitepress-vue-tsc-nested-template-expr

on:
  push:
    paths:
      - ".github/workflows/vitepress-vue-tsc-nested-template-expr.yml"
      - "vitepress-vue-tsc-nested-template-expr/**"
  pull_request:
    paths:
      - ".github/workflows/vitepress-vue-tsc-nested-template-expr.yml"
      - "vitepress-vue-tsc-nested-template-expr/**"
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitepress-vue-tsc-nested-template-expr
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vitepress-vue-tsc-nested-template-expr/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-workspace

      - name: Verify repro behavior
        shell: bash
        run: |
          set +e
          output="$(pnpm run typecheck 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            echo "Expected vue-tsc to fail, but it passed." >&2
            exit 1
          fi

          for fragment in \
            "docs/index.md(4,50): error TS1005: ',' expected." \
            "docs/index.md(4,51): error TS1005: ',' expected." \
            "docs/index.md(4,64): error TS1005: ',' expected."; do
            if ! grep -Fq "$fragment" <<<"$output"; then
              echo "Expected diagnostic not found: $fragment" >&2
              exit 1
            fi
          done

          {
            echo "## Reproduction confirmed"
            echo ""
            echo "vue-tsc still reports the expected TS1005 diagnostics for nested template literals in VitePress Markdown."
          } >> "$GITHUB_STEP_SUMMARY"
