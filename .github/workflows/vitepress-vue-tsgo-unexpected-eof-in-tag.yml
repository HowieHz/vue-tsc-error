name: vitepress-vue-tsgo-unexpected-eof-in-tag

on:
  push:
    paths:
      - ".github/workflows/vitepress-vue-tsgo-unexpected-eof-in-tag.yml"
      - "vitepress-vue-tsgo-unexpected-eof-in-tag/**"
  pull_request:
    paths:
      - ".github/workflows/vitepress-vue-tsgo-unexpected-eof-in-tag.yml"
      - "vitepress-vue-tsgo-unexpected-eof-in-tag/**"
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitepress-vue-tsgo-unexpected-eof-in-tag
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: vitepress-vue-tsgo-unexpected-eof-in-tag/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-workspace

      - name: Build docs
        id: docs_build
        run: pnpm run docs:build

      - name: vue-tsc two-template-attrs
        id: vue_tsc_two_template_attrs
        continue-on-error: true
        run: pnpm exec vue-tsc -p tsconfig.case.two-template-attrs.json --pretty false

      - name: vue-tsgo two-template-attrs
        id: vue_tsgo_two_template_attrs
        continue-on-error: true
        run: pnpm exec vue-tsgo -p tsconfig.case.two-template-attrs.json --pretty false

      - name: vue-tsc two-inline-codes
        id: vue_tsc_two_inline_codes
        continue-on-error: true
        run: pnpm exec vue-tsc -p tsconfig.case.two-inline-codes.json --pretty false

      - name: vue-tsgo two-inline-codes
        id: vue_tsgo_two_inline_codes
        continue-on-error: true
        run: pnpm exec vue-tsgo -p tsconfig.case.two-inline-codes.json --pretty false

      - name: vue-tsc template-then-inline
        id: vue_tsc_template_then_inline
        continue-on-error: true
        run: pnpm exec vue-tsc -p tsconfig.case.template-then-inline.json --pretty false

      - name: vue-tsgo template-then-inline
        id: vue_tsgo_template_then_inline
        continue-on-error: true
        run: pnpm exec vue-tsgo -p tsconfig.case.template-then-inline.json --pretty false

      - name: vue-tsc inline-then-template
        id: vue_tsc_inline_then_template
        continue-on-error: true
        run: pnpm exec vue-tsc -p tsconfig.case.inline-then-template.json --pretty false

      - name: vue-tsgo inline-then-template
        id: vue_tsgo_inline_then_template
        continue-on-error: true
        run: pnpm exec vue-tsgo -p tsconfig.case.inline-then-template.json --pretty false

      - name: Summarize and assert
        if: always()
        shell: bash
        run: |
          {
            echo "## Raw Typecheck Outcomes"
            echo ""
            echo "| Case | vue-tsc | vue-tsgo |"
            echo "| --- | --- | --- |"
            echo "| two-template-attrs | ${{ steps.vue_tsc_two_template_attrs.outcome }} | ${{ steps.vue_tsgo_two_template_attrs.outcome }} |"
            echo "| two-inline-codes | ${{ steps.vue_tsc_two_inline_codes.outcome }} | ${{ steps.vue_tsgo_two_inline_codes.outcome }} |"
            echo "| template-then-inline | ${{ steps.vue_tsc_template_then_inline.outcome }} | ${{ steps.vue_tsgo_template_then_inline.outcome }} |"
            echo "| inline-then-template | ${{ steps.vue_tsc_inline_then_template.outcome }} | ${{ steps.vue_tsgo_inline_then_template.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          [ "${{ steps.docs_build.outcome }}" = "success" ]
          [ "${{ steps.vue_tsc_two_template_attrs.outcome }}" = "success" ]
          [ "${{ steps.vue_tsc_two_inline_codes.outcome }}" = "success" ]
          [ "${{ steps.vue_tsc_template_then_inline.outcome }}" = "success" ]
          [ "${{ steps.vue_tsc_inline_then_template.outcome }}" = "success" ]

          failures=0
          for outcome in \
            "${{ steps.vue_tsgo_two_template_attrs.outcome }}" \
            "${{ steps.vue_tsgo_two_inline_codes.outcome }}" \
            "${{ steps.vue_tsgo_template_then_inline.outcome }}" \
            "${{ steps.vue_tsgo_inline_then_template.outcome }}"; do
            if [ "$outcome" = "failure" ]; then
              failures=$((failures + 1))
            fi
          done

          if [ "$failures" -lt 1 ]; then
            echo "Expected at least one vue-tsgo fixture to fail, but all four succeeded." >&2
            exit 1
          fi
